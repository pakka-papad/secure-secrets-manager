networks:
  app-net:

services:
  db:
    image: postgres:18
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sm_password}
      POSTGRES_DB: ${POSTGRES_DB:-secrets_manager}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sm_user -d secrets_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: secrets-manager-app
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-secrets_manager}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sm_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sm_password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

volumes:
  postgres-data:
