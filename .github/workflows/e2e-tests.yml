name: E2E Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Wait for Docker
      run: |
        timeout=60
        counter=0
        while ! docker info > /dev/null 2>&1; do
          if [ $counter -ge $timeout ]; then
            echo "Error: Docker daemon did not start within $timeout seconds."
            exit 1
          fi
          echo "Waiting for Docker daemon ($counter/$timeout)..."
          sleep 1
          counter=$((counter + 1))
        done
        echo "Docker is ready!"

    - name: Run E2E Tests
      run: ./gradlew e2eTest --info
