spring:
  application:
    name: secrets-manager
  cache:
    type: caffeine
  datasource:
    url: jdbc:postgresql://localhost:5433/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none # Flyway handles schema management
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:com/example/secrets_manager/db/migration

jwt:
  secret-key:
    public: ${JWT_PUBLIC_KEY}
    private: ${JWT_PRIVATE_KEY}
  expiration:
    access: 300000
    refresh: 2592000000

bootstrap:
  admin:
    username: ${BOOTSTRAP_USERNAME}
    password: ${BOOTSTRAP_PASSWORD}

bucket4j:
  enabled: true
  filters:
    # 1. Public Authentication Endpoints (IP-based)
    - cache-name: auth-buckets
      url: /api/v1/auth/.*
      strategy: first
      http-response-body: "{ \"timestamp\": \"${current_time}\", \"status\": 429, \"error\": \"Too Many Requests\", \"messages\": [\"Too many login or refresh attempts. Please try again later.\"], \"path\": \"${path}\" }"
      rate-limits:
        - cache-key: "getRemoteAddr()"
          bandwidths:
            - capacity: 5
              time: 1
              unit: minutes

    # 2. General Authenticated API Endpoints (User-based)
    - cache-name: general-api-buckets
      url: /api/v1/(users|secrets|groups)/.*
      strategy: first
      http-response-body: "{ \"timestamp\": \"${current_time}\", \"status\": 429, \"error\": \"Too Many Requests\", \"messages\": [\"General API rate limit exceeded. Please slow down.\"], \"path\": \"${path}\" }"
      rate-limits:
        - cache-key: "authentication?.name" # Identifies by User ID from JWT
          bandwidths:
            - capacity: 100
              time: 1
              unit: minutes
