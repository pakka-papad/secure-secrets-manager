spring:
  application:
    name: secrets-manager
  datasource:
    url: jdbc:postgresql://localhost:5433/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none # Flyway handles schema management
  flyway:
    enabled: true
    locations: classpath:db/migration
